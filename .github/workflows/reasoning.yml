name: Reasoning
on:
  push:
    paths: ['apps/reasoning/**', 'packages/contract/**']
  pull_request:
    paths: ['apps/reasoning/**', 'packages/contract/**']

jobs:
  reasoning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check "apps/reasoning/**"
      - run: pnpm --filter @mise/reasoning lint
      - run: pnpm --filter @mise/reasoning test
      - run: pnpm --filter @mise/reasoning build
