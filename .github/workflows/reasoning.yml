name: Reasoning
on:
  push:
    paths:
      [
        'apps/reasoning/**',
        'packages/contract/**',
        '.github/workflows/reasoning.yml',
      ]
  pull_request:
    paths:
      [
        'apps/reasoning/**',
        'packages/contract/**',
        '.github/workflows/reasoning.yml',
      ]

jobs:
  reasoning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # contract's dist/ is gitignored — build it before anything imports it
      - run: pnpm --filter @mise/contract build
      - run: pnpm exec prettier --check "apps/reasoning/**"
      - run: pnpm --filter @mise/reasoning lint
      - run: pnpm --filter @mise/reasoning test
      - run: pnpm --filter @mise/reasoning build
