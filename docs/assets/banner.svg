<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C2BD9"/>
      <stop offset="100%" stop-color="#3B1198"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>
  <!-- Bento box icon (🍱 stylised) -->
  <g transform="translate(80,55)">
    <rect x="15" y="15" width="170" height="170" rx="20" fill="url(#accent)" opacity="0.9"/>
    <line x1="100" y1="25" x2="100" y2="185" stroke="white" stroke-width="4" opacity="0.6"/>
    <line x1="25" y1="105" x2="100" y2="105" stroke="white" stroke-width="4" opacity="0.6"/>
    <circle cx="62" cy="65" r="18" fill="white" opacity="0.3"/>
    <circle cx="62" cy="145" r="18" fill="white" opacity="0.3"/>
    <circle cx="145" cy="100" r="28" fill="white" opacity="0.3"/>
  </g>
  <!-- Title -->
  <text x="290" y="135" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="82" font-weight="800" fill="white" letter-spacing="-2">mise</text>
  <!-- Subtitle -->
  <text x="290" y="185" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="26" fill="#C4B5FD" letter-spacing="0.5">Evidence-only regulatory intelligence for banks</text>
  <!-- Stats pills -->
  <g transform="translate(290,215)">
    <rect width="120" height="34" rx="17" fill="white" opacity="0.15"/>
    <text x="60" y="23" font-family="system-ui,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="600">5 corpora</text>
    <rect x="135" width="160" height="34" rx="17" fill="white" opacity="0.15"/>
    <text x="215" y="23" font-family="system-ui,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="600">compliance graph</text>
    <rect x="310" width="130" height="34" rx="17" fill="white" opacity="0.15"/>
    <text x="375" y="23" font-family="system-ui,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="600">human-attested</text>
    <rect x="455" width="140" height="34" rx="17" fill="white" opacity="0.15"/>
    <text x="525" y="23" font-family="system-ui,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="600">evidence-only AI</text>
  </g>
