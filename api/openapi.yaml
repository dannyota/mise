        - corpus_id
        - title
        - doc_number
        - citation_scheme
        - citation_path
        - language
        - validity_status
        - issuing_authority
        - signer_name
        - version
        - source_url
        - source_system
        - content_type
        - access_tier
        - ingest_run_id
        - observed_at
      type: object
    EdgeWire:
      additionalProperties: false
      properties:
        access_tier:
