components:
  schemas:
    ChainBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ChainBody.json
          format: uri
          readOnly: true
          type: string
        hops:
          items:
            $ref: "#/components/schemas/HopWire"
          type:
            - array
            - "null"
      required:
        - hops
      type: object
    EdgeWire:
      additionalProperties: false
      properties:
        access_tier:
          type: string
        created_at:
          type: string
        direction:
          type: string
        edge_type:
          type: string
        evidence:
          items:
            $ref: "#/components/schemas/EvidenceWire"
          type:
            - array
            - "null"
        from:
          $ref: "#/components/schemas/NodeRefWire"
        id:
          type: string
        promoted:
          type: boolean
        to_corpus_id:
          type: string
        to_ref_id:
          type: string
      required:
        - id
        - from
        - to_ref_id
        - to_corpus_id
        - edge_type
        - direction
        - promoted
        - access_tier
        - created_at
        - evidence
      type: object
    ErrorDetail:
      additionalProperties: false
      properties:
        location:
          description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
          type: string
        message:
          description: Error message text
          type: string
        value:
          description: The value at the given location
      type: object
    ErrorModel:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ErrorModel.json
          format: uri
          readOnly: true
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Property foo is required but is missing.
          type: string
        errors:
          description: Optional list of individual error details
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
        instance:
          description: A URI reference that identifies the specific occurrence of the problem.
          examples:
            - https://example.com/error-log/abc123
          format: uri
          type: string
        status:
          description: HTTP status code
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference to human-readable documentation for the error.
          examples:
            - https://example.com/errors/example
          format: uri
          type: string
      type: object
    EvidenceWire:
      additionalProperties: false
      properties:
        confidence:
          format: double
          type: number
        created_at:
          type: string
        created_by:
          type: string
        evidence_kind:
          type: string
        grounding_score:
          format: double
          type: number
        id:
          type: string
        model:
          type: string
        promoted_at:
          type: string
        promoted_by:
          type: string
        prompt_hash:
          type: string
        quoted_from_span:
          type: string
        quoted_to_span:
          type: string
        rationale:
          type: string
        run_id:
          type: string
      required:
        - id
        - evidence_kind
        - confidence
        - grounding_score
        - created_at
      type: object
    HopWire:
      additionalProperties: false
      properties:
        citation:
          type: string
        confidence:
          format: double
          type: number
        corpus_id:
          type: string
        edge_type:
          type: string
        grounding_score:
          format: double
          type: number
        promoted:
          type: boolean
        ref:
          $ref: "#/components/schemas/NodeRefWire"
        text:
          type: string
      required:
        - ref
        - edge_type
        - corpus_id
        - citation
        - promoted
        - confidence
        - grounding_score
      type: object
    NodeBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/NodeBody.json
          format: uri
          readOnly: true
          type: string
        edges:
          items:
            $ref: "#/components/schemas/EdgeWire"
          type:
            - array
            - "null"
        ref:
          $ref: "#/components/schemas/NodeRefWire"
      required:
        - ref
        - edges
      type: object
    NodeRefWire:
      additionalProperties: false
      properties:
        corpus_id:
          type: string
        document_id:
          type: string
        section_id:
          type: string
      required:
        - corpus_id
        - document_id
      type: object
info:
  title: mise
  version: 0.1.0
openapi: 3.1.0
paths:
  /graph/chain/{ref}:
    get:
      description: Walks relation_edge's "up" direction from ref — e.g. SOP -> Policy -> Group -> law (DATA-MODEL.md §4) — tier-filtering every hop exactly like GET /graph/nodes/{ref}. A hop role can't see, or that doesn't exist, ends the walk cleanly (200 with fewer hops) — never a 404 by itself.
      operationId: get-graph-chain
      parameters:
        - description: corpus_id/document_id[/section_id], / as %2F
          in: path
          name: ref
          required: true
          schema:
            description: corpus_id/document_id[/section_id], / as %2F
            examples:
              - sop%2Fdoc
            maxLength: 200
            type: string
        - description: Max hops; <=0 uses the default cap (shrink only)
          explode: false
          in: query
          name: max_depth
          schema:
            description: Max hops; <=0 uses the default cap (shrink only)
            examples:
              - 8
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainBody"
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Bad Request
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Walk the control chain from a graph node
      tags:
        - Graph
  /graph/nodes/{ref}:
    get:
      description: "Returns ref's outgoing relation_edge rows, each with its backing relation_evidence, tier-filtered to the caller's role. A ref with no visible edges — whether it truly has none, or every edge sits above role's tier — reports 404: the two cases are deliberately indistinguishable (DATA-MODEL.md §4)."
      operationId: get-graph-node
      parameters:
        - description: corpus_id/document_id[/section_id], / as %2F
          in: path
          name: ref
          required: true
          schema:
            description: corpus_id/document_id[/section_id], / as %2F
            examples:
              - vn-reg%2Fdoc-uuid
            maxLength: 200
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeBody"
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Bad Request
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Get a graph node's outgoing edges
      tags:
        - Graph
