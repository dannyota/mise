        citation_scheme:
          type: string
        content_type:
          type: string
        corpus_id:
          type: string
        doc_number:
          type: string
        effective_date:
          type: string
        expiry_date:
          type: string
        id:
          type: string
        ingest_run_id:
          type: string
        issued_date:
          type: string
        issuing_authority:
          type: string
        language:
          type: string
        observed_at:
          type: string
