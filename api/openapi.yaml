    AmendmentWire:
      additionalProperties: false
      properties:
        amending_doc_id:
          type: string
        clause:
          type: string
        event_date:
          type: string
        kind:
          type: string
      required:
        - clause
        - event_date
      type: object
    ChainBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/ChainBody.json
          format: uri
          readOnly: true
          type: string
        hops:
          items:
            $ref: "#/components/schemas/HopWire"
          type:
            - array
            - "null"
      required:
        - hops
      type: object
    CorpusAdminStatusWire:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/CorpusAdminStatusWire.json
