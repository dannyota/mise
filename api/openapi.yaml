  /graph/chain/{ref}:
    get:
      description: Walks relation_edge's "up" direction from ref — e.g. SOP -> Policy -> Group -> law (DATA-MODEL.md §4) — tier-filtering every hop exactly like GET /graph/nodes/{ref}. A hop role can't see, or that doesn't exist, ends the walk cleanly (200 with fewer hops) — never a 404 by itself.
      operationId: get-graph-chain
      parameters:
        - description: corpus_id/document_id[/section_id], / as %2F
          in: path
          name: ref
          required: true
          schema:
            description: corpus_id/document_id[/section_id], / as %2F
            examples:
              - sop%2Fdoc
            maxLength: 200
            type: string
        - description: Max hops; <=0 uses the default cap (shrink only)
          explode: false
          in: query
          name: max_depth
          schema:
            description: Max hops; <=0 uses the default cap (shrink only)
            examples:
              - 8
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainBody"
          description: OK
        "400":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Bad Request
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
      summary: Walk the control chain from a graph node
      tags:
        - Graph
  /graph/nodes/{ref}:
    get:
      description: "Returns ref's outgoing relation_edge rows, each with its backing relation_evidence, tier-filtered to the caller's role. A ref with no visible edges — whether it truly has none, or every edge sits above role's tier — reports 404: the two cases are deliberately indistinguishable (DATA-MODEL.md §4)."
      operationId: get-graph-node
      parameters:
        - description: corpus_id/document_id[/section_id], / as %2F
          in: path
          name: ref
          required: true
