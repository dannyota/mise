              - staleness
          items:
            type: string
          type:
            - array
            - "null"
        url:
          description: Webhook endpoint URL (HTTPS only)
          examples:
            - https://hooks.example.com/mise
          type: string
      required:
        - url
        - events
      type: object
    WebhookCreateOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/WebhookCreateOutputBody.json
          format: uri
          readOnly: true
          type: string
        id:
          type: string
      required:
        - id
      type: object
    WebhookDeleteOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/WebhookDeleteOutputBody.json
          format: uri
          readOnly: true
          type: string
        ok:
          type: boolean
      required:
        - ok
      type: object
    WebhookListOutputBody:
      additionalProperties: false
      properties:
        $schema:
          description: A URL to the JSON Schema for this object.
          examples:
            - https://example.com/schemas/WebhookListOutputBody.json
          format: uri
          readOnly: true
          type: string
        items:
          items:
            $ref: "#/components/schemas/WebhookWire"
          type:
            - array
            - "null"
      required:
        - items
      type: object
    WebhookWire:
      additionalProperties: false
      properties:
        active:
          type: boolean
        created_at:
          type: string
        events:
          items:
            type: string
          type:
            - array
            - "null"
        id:
          type: string
        url:
          type: string
      required:
        - id
        - url
        - events
        - active
        - created_at
      type: object
