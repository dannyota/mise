          type: string
        document_count:
          format: int64
          type: integer
        error_message:
          type:
            - string
            - "null"
        last_ingest:
          type: string
        status:
          type: string
        workflow_id:
          type:
            - string
            - "null"
      required:
        - corpus_id
        - status
        - last_ingest
        - workflow_id
        - document_count
        - error_message
      type: object
